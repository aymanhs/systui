name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  vet-and-build:
    name: vet + build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The release matrix — vet runs once on the native host, but we
          # cross-build all three release targets so a breakage shows up
          # before tag time, not at release time.
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # vet only needs to run once; pin it to the amd64 row so the matrix
      # doesn't waste CI minutes on three identical analysis passes.
      - name: go vet
        if: matrix.goarch == 'amd64'
        run: go vet ./...

      - name: go build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build -trimpath -ldflags="-s -w" -o /dev/null .
